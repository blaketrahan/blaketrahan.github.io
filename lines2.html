<!-- <button id="Animate">Animate</button> -->
<script>

  "use strict";
  
  var fps = 30;
  var frameDuration = 1000 / fps;
  var accumulator = 0;
  var previous = 0;
  var startTime = 0;

  var Canvashoon = function(options)
  {
  	"use strict";
  	this.x = options.x || 0;
    this.y = options.y || 0;
    this.prev_x = options.prev_x || 0;
    this.prev_y = options.prev_y || 0;
    this.render_x = options.render_x || 0;
    this.render_y = options.render_y || 0;
    this.amplitude = options.amplitude || 0;
    this.period = options.period || 2000;
    this.width = options.width || 32;
    this.height = options.height || 32;
    this.speed_multiplier = options.speed_multiplier || 15;
    this.canvas  = options.canvas || null;
    this.is_on = options.is_on || false;
    this.mouse = { x: 0, y: 0 };
    this.color = options.color || "#F04F24";

    if (this.canvas == null) {
    	console.log("ERROR: You forgot to set the canvas!");
    	return null;
    }

	this.get_mouse_pos = function(canvas, event)
	{
	    var rect = this.canvas.getBoundingClientRect();
	    return {
	      	x: event.clientX - rect.left,
 	 		y: event.clientY - rect.top
	    };
  	}.bind(this);

	this.canvas.addEventListener('mousemove', function(event)
	{
    	this.mouse = this.get_mouse_pos(this.canvas, event);
  	}.bind(this), false);

  	this.canvas.addEventListener("mouseout", function(event)
  	{
	  	if (this.is_on) {
	  		var W = this.canvas.width;
	  		var H = this.canvas.height;
		  	this.amplitude = this.mouse.x > W/2 ? W - 20 : 20;
		  	this.amplitude *= 0.5;
	  		this.is_on = false;
	  	}
	  	this.mouse.x = -1;
  	}.bind(this), false);


    this.update = function()
    {
      var D = window.performance.now() - startTime;
	  var W = this.canvas.width;
	  var H = this.canvas.height;
    
      // animation of choice
      var X = W / 2 - this.width / 2;
      this.x = this.amplitude * Math.sin(D * (this.speed_multiplier) * Math.PI / this.period) + X;
      this.amplitude *= 0.98;
      if (this.amplitude <= 1) this.amplitude = 0;
    }.bind(this);

    this.interpolate = function(alpha)
    {
      this.render_x = (this.x - this.prev_x) * alpha + this.prev_x;
      this.render_y = (this.x - this.prev_y) * alpha + this.prev_y;
    }.bind(this);

    this.display = function(alpha)
    {
		this.interpolate(alpha);
		var W = this.canvas.width;
		var H = this.canvas.height;
		var ctx = this.canvas.getContext("2d");

		ctx.fillStyle = '#FFFFFF';
	    ctx.fillRect(0, 0, W, H);
	    ctx.save();

		if (this.mouse.x > 20 && this.mouse.x < W-20)
		{
			this.is_on = true;
			this.x = (this.mouse.x > W/2) ? this.mouse.x - W/2 * -1 : this.mouse.x - W/2 * 1;
			this.x /= 2;
			this.render_x = this.x;
			this.prev_x = this.x;

			ctx.beginPath();
		  	ctx.lineWidth = 15;
		  	ctx.strokeStyle = this.color;
				ctx.moveTo(W / 2, 10);
				ctx.quadraticCurveTo(this.render_x + (this.width / 2), H / 2, W / 2, H - 10);
				ctx.stroke();
			ctx.closePath();

		} else 	{
		  	ctx.beginPath();
		  	ctx.lineWidth = 15;
		  	ctx.strokeStyle = this.color;
				ctx.moveTo(W / 2, 10);
				ctx.quadraticCurveTo(this.render_x + (this.width / 2), H / 2, W / 2, H - 10);
				ctx.stroke();
			ctx.closePath();
	   }

	   ctx.restore();
	}.bind(this);
  };


  function getRandomColor() {
        var letters = '0123456789ABCDEF';
        var color = '#';
        for (var i = 0; i < 6; i++ ) {
            color += letters[Math.floor(Math.random() * 16)];
        }
        return color;
    }

  var canvashoon = [];
  var canvases = document.getElementsByTagName("CANVAS");
  for (var c = 0; c < canvases.length; c++) {
	canvashoon.push(new Canvashoon(
	{
		canvas : canvases[c],
		color : getRandomColor(),
	}));
  }

  // document.getElementById("Animate").addEventListener("click",function(e){
  // 	canvashoon.amplitude = 40;
  // });

  var update = function() {
    for (var i =0; i < canvashoon.length; i++)
    	canvashoon[i].update();
  };
  
  var display = function(alpha) {
    for (var i =0; i < canvashoon.length; i++)
    	canvashoon[i].display(alpha);
  };
  
  var Loop = function() {
    requestAnimationFrame(Loop);
    
    var now = window.performance.now();
    var delta = now - previous;

    if (delta > 1000) {
      delta = frameDuration;
    }
    
    accumulator += delta;
    
    if (accumulator >= frameDuration)
    {

	  for (var i =0; i < canvashoon.length; i++) {
      	canvashoon[i].prev_x = canvashoon[i].x;
	    canvashoon[i].prev_y = canvashoon[i].y;
	  }
      
      update();
      
      accumulator -= frameDuration;
    }
    
    var alpha = accumulator / frameDuration;
    
    display(alpha);
    
    previous = now;
  };
  
  startTime = window.performance.now();
  Loop();

</script> 



</body>
</html>
