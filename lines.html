<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>title</title>
	</head>
<body>

<canvas id="game-canvas" width="480" height="480"></canvas>
<button id="Animate">Animate</button>
<script>

	// var c = document.getElementById("myCanvas");
	// var ctx = c.getContext("2d");
	// ctx.beginPath();
	// ctx.moveTo(2, 20);
	// ctx.quadraticCurveTo(50, 100, 100, 20);
	// ctx.stroke();

  "use strict";
  
  var canvas = document.getElementById("game-canvas");
  var ctx = canvas.getContext("2d");
  var canvasWidth = canvas.width;
  var canvasHeight = canvas.height;
  
  var fps = 30;
  var frameDuration = 1000 / fps;
  var accumulator = 0;
  var previous = 0;
  var startTime = 0;
  
  /**
   * just a simple sprite object for demonstration purposes 
   */
  var sprite = {
    x: canvasWidth / 2,
    y: canvasHeight / 2,
    displayX: 0,
    displayY: 0,
    amplitude: 150,
    period: 2000,
    width: 32,
    height: 32,
    speed_multiplier: 15,
    
    update: function() {
      // get the elapsed time since we started
      var time = window.performance.now() - startTime;
    
      // perform an oscillation animation
      var centerX = canvasWidth / 2 - this.width / 2;
      this.x = this.amplitude * Math.sin(time * (this.speed_multiplier) * Math.PI / this.period) + centerX;
      this.amplitude *= 0.98;
      if (this.amplitude <= 1) this.amplitude = 0;
    },
    
    interpolate: function(alpha) {
      // use the alpha and the sprites previous x/y pos to interpolate
      // the position
      this.displayX = (typeof this.previousX !== "undefined") ? 
        (this.x - this.previousX) * alpha + this.previousX : this.x;
      this.displayY = (typeof this.previousY !== "undefined") ? 
        (this.y - this.previousY) * alpha + this.previousY : this.y;
    },
    
    display: function(alpha) {
      this.interpolate(alpha);
      
      // draw the sprite bro
      // ctx.fillStyle = '#ffa700';
      // ctx.translate(this.displayX + (this.width / 2), this.displayY + (this.height / 2))
      // ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);

	  	ctx.beginPath();
	  	ctx.lineWidth = 15;
	  	ctx.strokeStyle = "#F04F24";
			ctx.moveTo(canvasWidth / 2, 10);
			ctx.quadraticCurveTo(this.displayX + (this.width / 2), canvasHeight / 2, canvasWidth / 2, canvasHeight - 10);
			ctx.stroke();
		ctx.closePath();
    }
  };

  document.getElementById("Animate").addEventListener("click",function(e){
  	sprite.amplitude = 150;
  });
  
  var update = function() {
    sprite.update();
  };
  
  var display = function(alpha) {
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
    ctx.save();
    sprite.display(alpha);
    ctx.restore();
  };
  
  var Loop = function() {
    requestAnimationFrame(Loop);
    
    var now = window.performance.now();
    var delta = now - previous;

    if (delta > 1000) {
      delta = frameDuration;
    }
    
    accumulator += delta;
    
    if (accumulator >= frameDuration)
    {
      sprite.previousX = sprite.x;
      sprite.previousY = sprite.y;
      
      update();
      
      accumulator -= frameDuration;
    }
    
    var alpha = accumulator / frameDuration;
    
    display(alpha);
    
    previous = now;
  };
  
  startTime = window.performance.now();
  Loop();

</script> 



</body>
</html>
