<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

		<style>
			/* http://meyerweb.com/eric/tools/css/reset/ 
   v2.0 | 20110126
   License: none (public domain)
*/


/*--------------------*/
/*--------------------*/
/*--------------------*/

			ul {
				background: #e0e0e0;
				width: 800px;
				list-style: none;
				padding: 0 40px;
				max-width: 100%;
				box-sizing: border-box;
			}
			li {
				/* this creates the square */
				position: relative; /* ! */
				width: 33.33333%; /* ! */
				height: 0; /* ! */
				padding-bottom: 33.33333%; /* ! */ 
				display:inline-block; /* ! */
				vertical-align: top; /* ! */
			}
			li .inner {
				/* this lets you use the padded space */
				position: absolute; /* ! */
				width: 100%; /* ! */
				height: 100%; /* ! */
			}
			li h1 {
				/* replacement for flex placement */
				position: absolute;
				bottom: 0;
				left: 0;
				margin-bottom: 36px; 
				margin-left: 36px; 
			}
			.red {
				background: red;
			}
			.blue {
				background: blue;
			}
			.green {
				background: green;
			}
			.yellow {
				background: yellow;
			}
			@media (max-width: 800px) {
				li {
					width: 50%; /* ! */ 
					padding-bottom: 50%; /* ! */ 
				}
			}
		</style>

  </head>
<body>

	<ul class="container">
		<li>
			<div class="inner red">
				<h1> some text </h1>
			</div>
		</li><li>
			<div class="inner blue">
				<h1> some text </h1>
			</div>
		</li><li>
			<div class="inner green">
				<h1> some text </h1>
			</div>
		</li><li>
			<div class="inner yellow">
				<h1> some text </h1>
			</div>
		</li><li>
			<div class="inner red">
				<h1> some text </h1>
			</div>
		</li><li>
			<div class="inner blue">
				<h1> some text </h1>
			</div>
		</li><li>
			<div class="inner green">
				<h1> some text </h1>
			</div>
		</li><li>
			<div class="inner yellow">
				<h1> some text </h1>
			</div>
		</li>
	</ul>

</body>
</html>
