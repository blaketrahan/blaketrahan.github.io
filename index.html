<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>something</title>
<style>
    html {
        font-size: 14px;
        line-height: 100%;
        font-family: "Comic Sans MS";
    }
    body {
        background: #dedede;
    }
    a {
        color: #860000 !important;
        font-size: 1rem;
        text-align: right;
        text-decoration: none !important;
        padding: 0.5rem;
        display: block;
        max-width: 10rem;
        width: auto;
        background: #f7b1b1;
        margin: 1rem auto;
        white-space: nowrap;
    }
    a:hover, a:focus {
        outline: 0;
        background: #c5c5c5;
        color: #000000 !important;
    }
    a:nth-child(1) {
        border-right: 1rem solid red;
        border-left: 1rem solid yellow;
    }
    a:nth-child(2) {
        border-right: 1rem solid blue;
        border-left: 1rem solid green;
    }
    a:nth-child(3) {
        border-right: 1rem solid aquamarine;
        border-left: 1rem solid wheat;
    }
    a:nth-child(4) {
        border-right: 1rem solid crimson;
        border-left: 1rem solid cadetblue;
    }
    a:nth-child(5) {
        border-right: 1rem solid fuchsia;
        border-left: 1rem solid rebeccapurple;
    }
    p {
        text-align: center;
    }
    img {
        margin: auto;
        display: block;
        max-width: 19rem;
    }
</style>
</head>
<body>
    <div>
        <a href="about.html">programming work</a>
    </div>
</body>
</html>
