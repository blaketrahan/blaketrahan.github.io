<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">

		<style>
		html, body {
			font-family: serif;
		    cursor: move;
		    cursor: grab;
		    cursor: -moz-grab;

		}
		a:hover {

		}
		.black {

			font-family: sans-serif;

		}

		}
		.twit {
			letter-spacing: 5px;

		}
		.work {

			font-style: italic;
		}

		.highlight-writing .writing,

			cursor: pointer;

			border-radius: 6px;
			background: #fff;
			outline: 0;
